name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code to reproduce the issue.
      placeholder: |
        1. Install `nostr-linkr@0.1.0`
        2. Call `createNostrLinkrClient({ ... })`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or stack traces if applicable.
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: viem-version
    attributes:
      label: viem version
      placeholder: "2.39.0"

  - type: dropdown
    id: chain
    attributes:
      label: Chain
      options:
        - Base Sepolia
        - Base
        - Ethereum Mainnet
        - Sepolia
        - Arbitrum
        - Optimism
        - Polygon
        - Hardhat (local)
        - Other

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "Node.js version, browser, OS, etc."
      placeholder: "Node.js 20.11.0, Chrome 122, macOS 15.3"
