name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Upgrade npm for OIDC trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build SDK
        run: yarn workspace nostr-linkr build

      - name: Run SDK tests
        run: yarn workspace nostr-linkr test

      - name: Publish with provenance
        run: |
          echo "npm version: $(npm --version)"
          echo "node version: $(node --version)"
          echo "NODE_AUTH_TOKEN set: $([ -n "$NODE_AUTH_TOKEN" ] && echo YES || echo NO)"
          unset NODE_AUTH_TOKEN
          echo "NODE_AUTH_TOKEN after unset: $([ -n "$NODE_AUTH_TOKEN" ] && echo YES || echo NO)"
          npm config list
          npm publish --provenance --access public
        working-directory: packages/sdk
